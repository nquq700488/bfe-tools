<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>bfe-tools</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0f172a}
iframe{width:100%;height:100%;border:none;display:block}
#btn{position:fixed;bottom:16px;right:16px;z-index:2147483647;width:36px;height:36px;border-radius:50%;border:1px solid rgba(148,163,184,.2);background:rgba(255,255,255,.55);color:#94a3b8;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 1px 4px rgba(0,0,0,.06);opacity:.7;transition:all .2s}
#btn:hover{background:rgba(255,255,255,.85);color:#475569;opacity:1}
</style>
</head>
<body>
<iframe id="frame" allow="camera;microphone"></iframe>
<button id="btn" title="设置">⚙</button>
<script>
var f=document.getElementById('frame');

document.getElementById('btn').onclick=function(){
  var t=window.__TAURI__; if(t) t.core.invoke('open_settings_window');
};

// Tauri 事件监听：导航
if(window.__TAURI__){
  window.__TAURI__.event.listen('bfe-navigate',function(e){
    if(e.payload) f.src=e.payload;
  });
}

// 启动：加载已保存 URL 或默认 dev 页面
if(window.__TAURI__){
  window.__TAURI__.core.invoke('get_target_url_with_query').then(function(url){
    if(url) f.src=url;
    else f.src='http://localhost:5173';  // dev 默认
  }).catch(function(){ f.src='http://localhost:5173'; });
} else {
  f.src='http://localhost:5173';
}
</script>
</body>
</html>
